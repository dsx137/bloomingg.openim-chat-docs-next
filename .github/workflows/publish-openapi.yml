name: Publish OpenAPI

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openapi-publish
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'docsets-sync/proposal' &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout merged revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify OpenAPI
        run: pnpm run docsets-sync:lint-openapi

      - name: Bundle OpenAPI
        run: pnpm exec redocly bundle api/chat/platform-api/v3/openapi.yaml --output "$RUNNER_TEMP/platform-api-openapi.json"

      - name: Bundle dereferenced OpenAPI for Postman Specification
        run: pnpm exec redocly bundle api/chat/platform-api/v3/openapi.yaml --dereferenced --output "$RUNNER_TEMP/platform-api-openapi-dereferenced.json"

      - name: Publish OpenAPI to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_ID: ${{ vars.POSTMAN_COLLECTION_ID }}
        run: pnpm run platform-api:publish-postman -- "$RUNNER_TEMP/platform-api-openapi.json"

      - name: Publish OpenAPI Specification to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_SPEC_ID: ${{ vars.POSTMAN_SPEC_ID }}
        run: pnpm run platform-api:publish-postman-spec -- "$RUNNER_TEMP/platform-api-openapi-dereferenced.json"

      - name: Publish OpenAPI to Apifox
        env:
          APIFOX_ACCESS_TOKEN: ${{ secrets.APIFOX_ACCESS_TOKEN }}
          APIFOX_PROJECT_ID: ${{ vars.APIFOX_PROJECT_ID }}
        run: pnpm run platform-api:publish-apifox -- "$RUNNER_TEMP/platform-api-openapi.json"
