name: Docsets sync proposal

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      docset_key:
        description: 'Optional docset key to check, for example chat/sdk/v4/wasm'
        required: false
        type: string
      dry_run:
        description: 'Collect diffs and run agent, but do not push a branch or open a PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docsets-sync-proposal
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MODEL: ${{ vars.MODEL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Setup pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Collect upstream docsets diffs
        id: collect
        env:
          DOCSET_KEY: ${{ inputs.docset_key }}
        run: |
          if [ -n "$DOCSET_KEY" ]; then
            pnpm run docsets-sync:diff -- --docset-key "$DOCSET_KEY"
          else
            pnpm run docsets-sync:diff
          fi

      - name: Log summary when no upstream changes were found
        if: ${{ steps.collect.outputs.changed != 'true' }}
        run: cat .docsets-sync/summary.md

      - name: Check existing proposal
        id: existing
        if: ${{ steps.collect.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url="$(gh pr list \
            --state open \
            --json headRefName,url \
            --jq '.[] | select(.headRefName | startswith("docsets-sync/")) | .url' \
            | head -n 1)"
          if [ -n "$url" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=$url" >> "$GITHUB_OUTPUT"
            echo "A docsets sync proposal is already open: $url"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create proposal branch
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' }}
        run: git checkout -b "docsets-sync/${GITHUB_RUN_ID}"

      - name: Apply docsets diffs with Agent
        id: pi
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' }}
        uses: shaftoe/pi-coding-agent-action@v2.25.1
        with:
          github_token: ${{ github.token }}
          provider: openai
          model: ${{ env.MODEL }}
          token: ${{ env.OPENAI_API_KEY }}
          base_url: ${{ env.OPENAI_BASE_URL }}
          prompt: Read and follow the instructions in .docsets-sync/prompt.md.
          extensions: npm:pi-exa@0.6.0

      - name: Refresh docs and verify
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' }}
        run: |
          pnpm run docsets-sync:baseline
          pnpm run content:sync
          pnpm exec fumadocs-mdx
          pnpm run check
          pnpm run build

      - name: Show dry-run diff
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' && inputs.dry_run }}
        run: |
          git status --short
          git diff --stat

      - name: Commit changes
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' && !inputs.dry_run }}
        id: commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: propose docsets sync"
          git push --set-upstream origin "docsets-sync/${GITHUB_RUN_ID}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: ${{ steps.collect.outputs.changed == 'true' && steps.existing.outputs.exists != 'true' && steps.commit.outputs.committed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "docsets-sync/${GITHUB_RUN_ID}" \
            --title "docs: update synced docsets" \
            --body-file .docsets-sync/summary.md
