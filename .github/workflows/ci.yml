name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: corepack enable && corepack prepare pnpm@10.28.0 --activate
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx fumadocs-mdx
      - name: Fetch pinned Platform API source
        run: |
          git init "$RUNNER_TEMP/openim-platform-api-source"
          git -C "$RUNNER_TEMP/openim-platform-api-source" remote add origin https://github.com/openimsdk/open-im-server.git
          git -C "$RUNNER_TEMP/openim-platform-api-source" fetch --depth=1 origin refs/tags/v3.8.3-patch.16:refs/tags/pinned-platform-api
          echo "PLATFORM_API_UPSTREAM_GIT_DIR=$RUNNER_TEMP/openim-platform-api-source/.git" >> "$GITHUB_ENV"
      - run: npm run check
      - run: npm run build
