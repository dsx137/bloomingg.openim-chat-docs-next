name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: corepack enable && corepack prepare pnpm@10.28.0 --activate
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx fumadocs-mdx
      - run: npm run check
      - run: npm run build
