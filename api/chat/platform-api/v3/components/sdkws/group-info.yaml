description: 'OpenIM group profile and configuration.'
additionalProperties: false
properties:
  applyMemberFriend:
    description: 'Whether members may add group members as friends.'
    format: int32
    type: integer
  createTime:
    description: 'Time when the record was created.'
    format: int64
    type: integer
  creatorUserID:
    description: 'Identifier of the user who created the group.'
    type: string
  ex:
    description: 'Application-defined extension data.'
    type: string
  faceURL:
    description: 'URL of the profile or group avatar.'
    type: string
  groupID:
    description: 'Unique group identifier.'
    type: string
  groupName:
    description: 'Display name of the group.'
    type: string
  groupType:
    description: 'Configured type of the group.'
    format: int32
    type: integer
    minimum: 0
    maximum: 2
  introduction:
    description: 'Description of the group.'
    type: string
  lookMemberInfo:
    description: 'Whether members may view group member information.'
    format: int32
    type: integer
  memberCount:
    description: 'Current number of group members.'
    format: int32
    minimum: 0
    type: integer
  needVerification:
    description: 'Verification policy for joining the group.'
    format: int32
    type: integer
  notification:
    description: 'Current group announcement.'
    type: string
  notificationUpdateTime:
    description: 'Time when the group announcement was last updated.'
    format: int64
    type: integer
  notificationUserID:
    description: 'Identifier of the user who published the group announcement.'
    type: string
  ownerUserID:
    description: 'Identifier of the user who owns the record.'
    type: string
  status:
    description: 'Protocol status code for this record.'
    format: int32
    type: integer
type: object
