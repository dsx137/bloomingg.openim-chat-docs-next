additionalProperties: false
description: Message content and delivery metadata returned by OpenIM.
properties:
  atUserIDList:
    description: 'User IDs mentioned in the message.'
    items:
      type: string
    type: array
  attachedInfo:
    description: 'Additional message or conversation information.'
    type: string
  clientMsgID:
    description: 'Client-generated unique message identifier.'
    type: string
  content:
    description: 'Serialized message content.'
    format: byte
    type: string
  contentType:
    description: 'Message content type that selects how to parse content.'
    format: int32
    type: integer
  createTime:
    description: 'Time when the record was created.'
    format: int64
    type: integer
  ex:
    description: 'Application-defined extension data.'
    type: string
  groupID:
    description: 'Unique group identifier.'
    type: string
  isRead:
    description: 'Whether the message has been read.'
    type: boolean
  msgFrom:
    description: 'Source category of the message.'
    format: int32
    type: integer
  offlinePushInfo:
    $ref: offline-push-info.yaml
  options:
    description: 'Message option flags.'
    additionalProperties:
      type: boolean
    type: object
  recvID:
    description: 'Identifier of the message recipient.'
    type: string
  sendID:
    description: 'Identifier of the message sender.'
    type: string
  sendTime:
    description: 'Time when the message was sent.'
    format: int64
    type: integer
  senderFaceURL:
    description: 'URL of the sender avatar.'
    type: string
  senderNickname:
    description: 'Nickname of the message sender.'
    type: string
  senderPlatformID:
    description: 'Platform identifier of the message sender.'
    format: int32
    type: integer
  seq:
    description: 'Sequence number of the message.'
    format: int64
    type: integer
  serverMsgID:
    description: 'Server-generated unique message identifier.'
    type: string
  sessionType:
    description: 'Session type of the message.'
    format: int32
    type: integer
  status:
    description: 'Protocol status code for this record.'
    format: int32
    type: integer
type: object
