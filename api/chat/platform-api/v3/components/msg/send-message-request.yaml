type: object
additionalProperties: false
required:
  - sendID
  - content
  - contentType
  - sessionType
properties:
  sendID:
    type: string
    minLength: 1
  recvID:
    type: string
    description: Destination user for single-chat and notification sessions.
  groupID:
    type: string
    description: Destination group for group-chat sessions.
  senderNickname:
    type: string
  senderFaceURL:
    type: string
    format: uri
  senderPlatformID:
    type: integer
    format: int32
  content:
    description: 'Shape selected by contentType: 101 text, 102 picture, 103 voice, 104 video, 105 file, 106 @ text, 110 custom, or 1400 OA notification.'
  contentType:
    type: integer
    format: int32
    enum:
      - 101
      - 102
      - 103
      - 104
      - 105
      - 106
      - 110
      - 1400
  sessionType:
    type: integer
    format: int32
    enum:
      - 1
      - 3
      - 4
  isOnlineOnly:
    type: boolean
  notOfflinePush:
    type: boolean
  sendTime:
    type: integer
    format: int64
  offlinePushInfo:
    $ref: ../sdkws/offline-push-info.yaml
  ex:
    type: string
allOf:
  - oneOf:
      - properties:
          sessionType:
            enum:
              - 1
              - 4
          recvID:
            minLength: 1
        required:
          - recvID
      - properties:
          sessionType:
            enum:
              - 3
          groupID:
            minLength: 1
        required:
          - groupID
oneOf:
  - properties:
      contentType:
        enum:
          - 101
      content:
        $ref: text-message-content.yaml
  - properties:
      contentType:
        enum:
          - 102
      content:
        $ref: picture-message-content.yaml
  - properties:
      contentType:
        enum:
          - 103
      content:
        $ref: sound-message-content.yaml
  - properties:
      contentType:
        enum:
          - 104
      content:
        $ref: video-message-content.yaml
  - properties:
      contentType:
        enum:
          - 105
      content:
        $ref: file-message-content.yaml
  - properties:
      contentType:
        enum:
          - 106
      content:
        $ref: at-message-content.yaml
  - properties:
      contentType:
        enum:
          - 110
      content:
        $ref: custom-message-content.yaml
  - properties:
      contentType:
        enum:
          - 1400
      sessionType:
        enum:
          - 4
      content:
        $ref: oa-notification-message-content.yaml
