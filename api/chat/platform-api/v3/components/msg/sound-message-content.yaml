type: object
additionalProperties: false
required:
  - sourceUrl
  - duration
properties:
  uuid:
    type: string
  soundPath:
    type: string
  sourceUrl:
    type: string
    format: uri
    minLength: 1
  dataSize:
    type: integer
    format: int64
  duration:
    type: integer
    format: int64
    minimum: 1
