type: object
additionalProperties: false
required:
  - sourceUrl
  - fileName
  - fileSize
properties:
  filePath:
    type: string
  uuid:
    type: string
  sourceUrl:
    type: string
    format: uri
    minLength: 1
  fileName:
    type: string
    minLength: 1
  fileSize:
    type: integer
    format: int64
