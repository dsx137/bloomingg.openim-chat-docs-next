type: object
additionalProperties: false
required:
  - notificationName
  - notificationType
  - text
properties:
  notificationName:
    type: string
    minLength: 1
  notificationFaceURL:
    type: string
    format: uri
  notificationType:
    type: integer
    format: int32
  text:
    type: string
    minLength: 1
  url:
    type: string
    format: uri
  mixType:
    type: integer
    format: int32
    minimum: 0
    maximum: 5
  pictureElem:
    $ref: picture-message-content.yaml
  soundElem:
    $ref: sound-message-content.yaml
  videoElem:
    $ref: video-message-content.yaml
  fileElem:
    $ref: file-message-content.yaml
  ex:
    type: string
