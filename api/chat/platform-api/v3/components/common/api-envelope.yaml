type: object
required:
  - errCode
  - errMsg
  - errDlt
properties:
  errCode:
    type: integer
    format: int32
    description: Business result code. Zero indicates success.
  errMsg:
    type: string
    description: Brief error message; empty on success.
  errDlt:
    type: string
    description: Detailed error information; empty on success.
