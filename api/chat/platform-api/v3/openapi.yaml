openapi: 3.0.3
info:
  title: OpenIM Platform API v3
  version: 3.8.3-patch.16
  description: OpenIM Platform API root entrypoint assembled from path-domain YAML files. It documents routes implemented by OpenIM Server v3.8.3-patch.16 and schemas corresponding to protocol v0.0.73-alpha.12. OpenIM returns HTTP 200 for both successful and failed business operations; clients must inspect errCode.
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://{host}
    description: Your OpenIM API endpoint
    variables:
      host:
        default: api.example.invalid
        description: Hostname of the deployed OpenIM API service.
tags:
  - name: Authentication
    description: OpenIM authentication operations.
  - name: Conversations
    description: OpenIM conversation operations.
  - name: Friends
    description: OpenIM friend relationship operations.
  - name: Moderation
    description: OpenIM moderation operations.
  - name: Groups
    description: OpenIM groups operations.
  - name: JavaScript SDK
    description: OpenIM JavaScript SDK support operations.
  - name: Messages
    description: OpenIM messages operations.
  - name: Object storage
    description: OpenIM object-storage operations.
  - name: Service discovery
    description: OpenIM Prometheus service-discovery operations.
  - name: Statistics
    description: OpenIM statistics operations.
  - name: Third-party services
    description: OpenIM third-party integration operations.
  - name: Users
    description: OpenIM users operations.
externalDocs:
  description: OpenIM Server release v3.8.3-patch.16
  url: https://github.com/openimsdk/open-im-server/releases/tag/v3.8.3-patch.16
