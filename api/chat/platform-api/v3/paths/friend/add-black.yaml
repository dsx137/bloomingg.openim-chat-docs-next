post:
  tags:
    - Moderation
  summary: Block user
  description: Adds an OpenIM user to the current user's block list.
  operationId: friendAddBlack
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/friend/add-black-request.yaml
        examples:
          example1:
            summary: Block user
            value:
              ownerUserID: '11111111'
              blackUserID: '11111113'
              ex: ex
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/moderation/blocking-users/block-users
  x-docs-paths:
    - /docs/chat/platform-api/v3/moderation/blocking-users/block-users
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/friend.go
