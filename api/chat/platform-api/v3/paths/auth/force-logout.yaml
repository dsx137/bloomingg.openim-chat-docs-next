post:
  tags:
    - 'Public'
    - Authentication
  summary: Revoke all session tokens
  description: Revokes every active session token for an OpenIM user.
  operationId: authForceLogout
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/auth/force-logout-request.yaml
        examples:
          example1:
            summary: Revoke all session tokens
            value:
              platformID: 2
              userID: '4950983283'
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/user/managing-session-tokens/revoke-all-session-tokens
  x-docs-paths:
    - /docs/chat/platform-api/v3/user/managing-session-tokens/revoke-all-session-tokens
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/auth.go
