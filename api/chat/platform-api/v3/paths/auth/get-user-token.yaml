post:
  tags:
    - 'Public'
    - Authentication
  summary: Issue session token
  description: Issues a session token for an OpenIM user on the selected platform.
  operationId: authGetUserToken
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/auth/get-user-token-request.yaml
        examples:
          example1:
            summary: Issue session token
            value:
              platformID: 1
              userID: '111111'
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/auth/get-user-token-response.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/user/managing-session-tokens/issue-a-session-token
  x-docs-paths:
    - /docs/chat/platform-api/v3/user/managing-session-tokens/issue-a-session-token
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/auth.go
