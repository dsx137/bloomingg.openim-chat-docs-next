post:
  tags:
    - 'Public'
    - Groups
  summary: Join group
  description: Submits a request for an OpenIM user to join a group.
  operationId: groupJoinGroup
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/group/join-group-request.yaml
        examples:
          example1:
            summary: Join group
            value:
              groupID: xadxwr24
              reqMessage: req msg join group
              joinSource: 2
              inviterUserID: '4251711209'
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/channel/managing-a-channel/join-a-channel
  x-docs-paths:
    - /docs/chat/platform-api/v3/channel/managing-a-channel/join-a-channel
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/group.go
