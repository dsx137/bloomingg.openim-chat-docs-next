post:
  tags:
    - 'Public'
    - Groups
  summary: Handle group application
  description: Accepts or rejects a user's application to join an OpenIM group.
  operationId: groupGroupApplicationResponse
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/group/group-application-response-request.yaml
        examples:
          example1:
            summary: Reject group application
            value:
              groupID: xadxwr24
              fromUserID: '2966378840'
              handledMsg: ''
              handleResult: -1
          example2:
            summary: Accept group application
            value:
              groupID: xadxwr24
              fromUserID: '2966378840'
              handledMsg: ''
              handleResult: 1
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/channel/inviting-a-user/decline-an-invitation-channel
  x-docs-paths:
    - /docs/chat/platform-api/v3/channel/inviting-a-user/decline-an-invitation-channel
    - /docs/chat/platform-api/v3/channel/inviting-a-user/accept-an-invitation-channel
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/group.go
