  x-export-category: Public
  summary: Update group
  description: Updates selected profile and configuration fields for an OpenIM group.
  operationId: groupSetGroupInfoEx
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/group/set-group-info-ex-request.yaml
        examples:
          example1:
            summary: Update group
            value:
              groupID: xadxwr24
              groupName: new name
              notification: new notification
              introduction: new introduction
              faceURL: www.newfaceURL.com
              ex: new ex
              needVerification: 1
              lookMemberInfo: 1
              applyMemberFriend: 1
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/channel/managing-a-channel/update-a-group-channel
  x-docs-paths:
    - /docs/chat/platform-api/v3/channel/managing-a-channel/update-a-group-channel
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/group.go
