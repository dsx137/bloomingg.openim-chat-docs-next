  operationId: groupCreateGroup
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/group/create-group-request.yaml
        examples:
          example1:
            summary: Create group
            value:
              memberUserIDs:
                - '1225441072'
              adminUserIDs:
                - '2065939257'
              ownerUserID: '1054527962'
              groupInfo:
                groupID: xadxwr24
                groupName: yourg group name
                notification: notification
                introduction: introduction
                faceURL: faceURL url
                ex: ex
                groupType: 2
                needVerification: 0
                lookMemberInfo: 0
                applyMemberFriend: 0
