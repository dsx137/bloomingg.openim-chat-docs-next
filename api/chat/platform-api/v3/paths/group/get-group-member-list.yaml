  operationId: groupGetGroupMemberList
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/group/get-group-member-list-request.yaml
        examples:
          example1:
            summary: List group members
            value:
              groupID: '2559217223'
              keyword: userID
              pagination:
                pageNumber: 1
                showNumber: 100
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/group/get-group-member-list-response.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/channel/listing-users/list-members-of-a-group-channel
