post:
  tags:
    - Users
  summary: Create user
  description: Creates an OpenIM user account with the supplied profile information.
  operationId: userUserRegister
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/user/user-register-request.yaml
        examples:
          example1:
            summary: Create user
            value:
              users:
                - userID: '11111112'
                  nickname: yourNickname
                  faceURL: yourFaceURL
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/user/creating-users/create-a-user
  x-docs-paths:
    - /docs/chat/platform-api/v3/user/creating-users/create-a-user
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/user.go
