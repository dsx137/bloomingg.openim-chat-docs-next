post:
  tags:
    - 'Public'
    - Users
  summary: Update user
  description: Updates selected profile fields for an OpenIM user.
  operationId: userUpdateUserInfoEx
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/user/update-user-info-ex-request.yaml
        examples:
          example1:
            summary: Update user
            value:
              userInfo:
                userID: '2'
                nickname: alantestuid3
                faceURL: ''
                ex: '123'
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/user/managing-users/update-a-user
  x-docs-paths:
    - /docs/chat/platform-api/v3/user/managing-users/update-a-user
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/user.go
