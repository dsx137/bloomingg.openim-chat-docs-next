post:
  tags:
    - 'Public'
    - Users
  x-apifox-folder: 'Public/Users'
  summary: Get users
  description: Returns public profile information for specified OpenIM users.
  operationId: userGetUsersInfo
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/user/get-designate-users-request.yaml
        examples:
          example1:
            summary: Get users
            value:
              userIDs:
                - '11111111'
                - '11111112'
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/user/get-designate-users-response.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/user/listing-users/get-a-user
  x-docs-paths:
    - /docs/chat/platform-api/v3/user/listing-users/get-a-user
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/user.go
