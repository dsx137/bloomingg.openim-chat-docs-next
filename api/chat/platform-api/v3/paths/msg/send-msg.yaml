post:
  tags:
    - 'Public'
    - Messages
  x-apifox-folder: 'Public/Messages'
  summary: Send message
  description: Sends a new message or imports an existing message into OpenIM.
  operationId: msgSendMsg
  parameters:
    - $ref: ../../components/common/operation-id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/msg/send-message-request.yaml
        examples:
          example1:
            summary: Migrate message
            value:
              sendID: openIMAdmin
              recvID: '2839678182'
              content:
                content: hello!!
              contentType: 101
              sessionType: 1
              isOnlineOnly: false
              notOfflinePush: false
              sendTime: 1695212630740
              offlinePushInfo:
                title: send message
                desc: ''
                ex: ''
                iOSPushSound: default
                iOSBadgeCount: true
              ex: ex
          example2:
            summary: Send message
            value:
              sendID: openIMAdmin
              recvID: '2839678182'
              content:
                content: hello!!
              contentType: 101
              sessionType: 1
              isOnlineOnly: false
              notOfflinePush: false
              sendTime: 1695212630740
              offlinePushInfo:
                title: send message
                desc: ''
                ex: ''
                iOSPushSound: default
                iOSBadgeCount: true
              ex: ex
  responses:
    '200':
      description: OpenIM result envelope. Inspect errCode; zero indicates success.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/common/api-envelope.yaml
              - type: object
                properties:
                  data:
                    $ref: ../../components/msg/send-msg-response.yaml
    '400':
      description: The JSON request could not be bound. Inspect the OpenIM error envelope.
      content:
        application/json:
          schema:
            $ref: ../../components/common/api-envelope.yaml
  security:
    - TokenAuth: []
  externalDocs:
    description: Matching project documentation
    url: https://docs.openim.io/docs/chat/platform-api/v3/message/messaging-basics/send-a-message
  x-docs-paths:
    - /docs/chat/platform-api/v3/migration/migrate-messages
    - /docs/chat/platform-api/v3/message/messaging-basics/send-a-message
  x-source-handler: https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/msg.go
