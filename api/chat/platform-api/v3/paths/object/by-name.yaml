get:
  tags:
    - 'Private'
    - 'Object storage'
  summary: 'ObjectName'
  description: 'OpenIM Server GET route handled by t.ObjectRedirect. Documented fields reflect the upstream wire types; handler-specific validation may impose additional constraints.'
  operationId: getObjectName
  parameters:
    - $ref: ../../components/common/operation-id.yaml
    - name: name
      in: path
      required: true
      description: Object key captured by the upstream Gin wildcard, including embedded slashes.
      schema:
        type: string
        minLength: 1
  responses:
    '302':
      description: Redirect to the configured upstream resource.
      headers:
        Location:
          description: Redirect target.
          schema:
            type: string
            format: uri
    '400':
      description: The wildcard object name is empty or invalid.
    '404':
      description: The object does not exist.
    '500':
      description: Object redirect generation failed.
  security: []
  x-source-handler: 'https://github.com/openimsdk/open-im-server/blob/v3.8.3-patch.16/internal/api/third.go'
  x-source-gin-path: '/object/*name'
